spring:
  application:
    name: weizhi-agent-v2
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 3017

minimax:
  endpoint: https://api.minimax.chat/v1
  # MiniMax OpenAI-compatible chat completions endpoint (v2 /text/chatcompletion_v2 is deprecated/404)
  chat-endpoint: ${minimax.endpoint}/chat/completions
  image-generation-endpoint: ${minimax.endpoint}/image_generation
  tts-endpoint: ${minimax.endpoint}/t2a_v2
  model: ${MINIMAX_REVIEW_MODEL:MiniMax-M2.7}

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}

openai:
  api-key: ${OPENAI_API_KEY:}
  base-url: ${OPENAI_BASE_URL:https://api.shqbb.com/v1}
  model: ${OPENAI_MODEL:gpt-5.5}

gemini:
  api-key: ${GEMINI_API_KEY:}
  base-url: ${GEMINI_BASE_URL:http://127.0.0.1:8045/v1}
  model: ${GEMINI_MODEL:claude-3-5-sonnet-20240620}
  image-model: ${GEMINI_IMAGE_MODEL:gemini-3-pro-image}

settings:
  file: data/ai-settings.json

tavily:
  api-key: ${TAVILY_API_KEY:}
  endpoint: ${TAVILY_ENDPOINT:https://api.tavily.com/search}

app:
  generated-images-path: generated_images

storage:
  image-dir: ${app.generated-images-path:generated_images}
  audio-dir: generated_audio
  image-history-file: data/image-history.json
  tts-history-file: data/tts-history.json

data-management:
  mode: ${WEIZHI_DATA_SOURCE_MODE:postgresql}

weizhi:
  postgresql:
    enabled: ${WEIZHI_POSTGRES_ENABLED:true}
    host: ${WEIZHI_POSTGRES_HOST:localhost}
    port: ${WEIZHI_POSTGRES_PORT:5432}
    database: ${WEIZHI_POSTGRES_DB:weizhi}
    username: ${WEIZHI_POSTGRES_USER:weizhi}
    password: ${WEIZHI_POSTGRES_PASSWORD:weizhi_password}
    connection-timeout-seconds: ${WEIZHI_POSTGRES_TIMEOUT_SECONDS:3}
